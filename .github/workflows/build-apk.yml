# 自动打包 APK
# 推送到 GitHub 后自动编译 APK，可在 Actions 页面下载
name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool libtool-bin \
            build-essential ccache libssl-dev \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev liblzma-dev \
            libsqlite3-dev libffi-dev \
            libbz2-dev pkg-config automake \
            libtinfo5
          pip install --upgrade buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          # 接受所有 SDK 许可证
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/default/bin/sdkmanager --licenses 2>/dev/null || true

          # 把 autoreconf 包装成总是返回 0，这样 libffi 的 autoreconf 错误不会导致构建失败
          # 即使 LT_SYS_SYMBOL_USCORE 宏找不到，构建也能继续
          sudo mv /usr/bin/autoreconf /usr/bin/autoreconf.real
          cat | sudo tee /usr/bin/autoreconf << 'EOF'
          #!/bin/bash
          /usr/bin/autoreconf.real "$@" 2>&1
          exit 0
          EOF
          sudo chmod +x /usr/bin/autoreconf

          # 构建 APK
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 消个箭头-APK
          path: bin/*.apk
