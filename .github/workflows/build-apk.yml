# 自动打包 APK
name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer & dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool libtool-bin \
            build-essential ccache libssl-dev \
            libncurses5-dev libncursesw5-dev \
            zlib1g-dev liblzma-dev \
            libsqlite3-dev libffi-dev \
            libbz2-dev pkg-config
          pip install --upgrade buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build APK
        run: |
          # 接受所有 SDK 许可证
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/default/bin/sdkmanager --licenses 2>/dev/null || true

          # 首先手动预下载 libffi 并生成 configure 脚本，绕过 autoreconf 失败
          # 这样 buildozer 的 libffi 构建会跳过 autoreconf
          mkdir -p ~/.buildozer/android/platform/build-arm64-v8a/packages/libffi/
          if [ ! -f ~/.buildozer/android/platform/build-arm64-v8a/packages/libffi/v3.4.2.tar.gz ]; then
            curl -sL -o /tmp/libffi-3.4.2.tar.gz https://github.com/libffi/libffi/archive/v3.4.2.tar.gz
            # 解压并预生成 configure，然后重新打包
            cd /tmp
            tar xzf libffi-3.4.2.tar.gz
            cd libffi-3.4.2
            # 用 autoupdate 更新宏，再运行 autoreconf
            autoupdate 2>/dev/null || true
            # 手动设置 libtool m4 宏路径
            export ACLOCAL_PATH="/usr/share/aclocal"
            autoreconf --force -I m4 2>&1 || true
            # 确保 configure 和辅助文件已生成
            if [ -f configure ]; then
              echo "configure generated successfully"
            fi
            # 重新打包（去掉 .git 等）
            cd /tmp
            tar czf ~/.buildozer/android/platform/build-arm64-v8a/packages/libffi/v3.4.2.tar.gz libffi-3.4.2
            rm -rf /tmp/libffi-3.4.2
          fi

          # 构建 APK
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 消个箭头-APK
          path: bin/*.apk
